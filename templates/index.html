<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOLO11 · 智能图片检测</title>
    <!-- 引入字体图标 -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 全局重置 + 科技风基础变量 */
        :root {
            --primary-color: #165DFF;
            --primary-light: #4080FF;
            --bg-dark: #0F172A;
            --bg-medium: #1E293B;
            --bg-light: #334155;
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --border-color: #2A3950;
            --shadow: 0 0 15px rgba(22, 93, 255, 0.2);
            --gradient: linear-gradient(135deg, #165DFF 0%, #00C6FF 100%);
            --blur: blur(8px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Inter", "Microsoft Yahei", sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(22, 93, 255, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(0, 198, 255, 0.1) 0%, transparent 20%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        /* 容器样式（主流大模型居中+窄版设计） */
        .container {
            max-width: 850px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 40px);
            gap: 16px;
        }

        /* 顶部标题栏（科技感渐变+光影） */
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .header-logo {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
        }

        .header-title {
            font-size: 20px;
            font-weight: 600;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 聊天区域（主流大模型深色气泡+滚动优化） */
        .chat-box {
            flex: 1;
            padding: 20px;
            border-radius: 16px;
            background-color: var(--bg-medium);
            backdrop-filter: var(--blur);
            border: 1px solid var(--border-color);
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--primary-light) var(--bg-medium);
        }

        .chat-box::-webkit-scrollbar {
            width: 6px;
        }

        .chat-box::-webkit-scrollbar-thumb {
            background-color: var(--primary-light);
            border-radius: 3px;
        }

        .chat-box::-webkit-scrollbar-track {
            background-color: var(--bg-medium);
        }

        /* 消息气泡（主流大模型样式：用户右对齐蓝渐变，AI左对齐深色磨砂） */
        .message {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            animation: fadeIn 0.3s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .user-avatar {
            background: var(--gradient);
            box-shadow: var(--shadow);
        }

        .ai-avatar {
            background-color: var(--bg-light);
            border: 1px solid var(--border-color);
        }

        .message-content {
            flex: 1;
            max-width: 80%;
        }

        .message-bubble {
            padding: 16px 20px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 14px;
        }

        .user-message {
            flex-direction: row-reverse;
        }

        .user-message .message-bubble {
            background: var(--gradient);
            box-shadow: var(--shadow);
            border-bottom-right-radius: 4px;
        }

        .ai-message .message-bubble {
            background-color: var(--bg-light);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
            color: var(--text-primary);
        }

        .message-time {
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 4px;
            margin-left: 48px;
        }

        .ai-message .message-time {
            margin-left: 48px;
        }

        .user-message .message-time {
            text-align: right;
            margin-right: 48px;
            margin-left: 0;
        }

        /* 输入区域（主流大模型磨砂玻璃+圆角+科技感边框） */
        .input-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 16px;
            border-radius: 16px;
            background-color: var(--bg-medium);
            border: 1px solid var(--border-color);
            backdrop-filter: var(--blur);
            box-shadow: var(--shadow);
        }

        .tool-bar {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tool-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--bg-light);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s ease;
        }

        .tool-btn:hover {
            background-color: var(--primary-light);
            color: white;
            border-color: var(--primary-light);
        }

        .file-info {
            font-size: 12px;
            color: var(--text-secondary);
            margin-left: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        /* 输入框+发送按钮（主流大模型样式） */
        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .text-input {
            flex: 1;
            height: 48px;
            background-color: var(--bg-light);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 0 20px;
            color: var(--text-primary);
            outline: none;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .text-input:focus {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 2px rgba(22, 93, 255, 0.1);
        }

        .text-input::placeholder {
            color: var(--text-secondary);
        }

        .send-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--gradient);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: var(--shadow);
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(22, 93, 255, 0.3);
        }

        .send-btn:disabled {
            background-color: var(--bg-light);
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* 隐藏文件输入框（兼容+科技感） */
        .upload-input {
            visibility: hidden !important;
            position: absolute !important;
            width: 0 !important;
            height: 0 !important;
            opacity: 0 !important;
            z-index: -1 !important;
        }

        /* 加载动画（AI思考时的打字效果） */
        .loading {
            display: flex;
            gap: 2px;
            padding: 16px 20px;
        }

        .loading-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--primary-light);
            animation: bounce 1s infinite ease-in-out;
        }

        .loading-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        /* 响应式设计（适配手机/平板） */
        @media (max-width: 768px) {
            .container {
                height: calc(100vh - 20px);
                padding: 10px;
            }

            .message-bubble {
                max-width: 90%;
                padding: 12px 16px;
            }

            .header-title {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 顶部标题栏（主流大模型风格） -->
        <div class="header">
            <div class="header-logo">
                <i class="fas fa-brain"></i>
            </div>
            <div class="header-title">YOLO11 · 智能图片检测</div>
        </div>

        <!-- 聊天区域 -->
        <div class="chat-box" id="chatBox"></div>

        <!-- 输入区域（主流大模型磨砂玻璃样式） -->
        <div class="input-area">
            <div class="tool-bar">
                <!-- 图片上传按钮 -->
                <label for="imageFile" class="tool-btn" title="上传图片">
                    <i class="fas fa-image"></i>
                    <input type="file" id="imageFile" class="upload-input" accept="image/*">
                </label>
                <!-- 清空按钮 -->
                <span class="tool-btn" title="清空输入" onclick="clearInput()">
                    <i class="fas fa-times"></i>
                </span>
                <!-- 文件信息提示 -->
                <span class="file-info" id="fileInfo"></span>
            </div>

            <div class="input-wrapper">
                <input type="text" class="text-input" id="textInput" placeholder="输入你的问题（如：检测到多少人？），支持图片内容分析">
                <button class="send-btn" id="sendBtn" disabled>
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        const chatBox = document.getElementById('chatBox');
        const textInput = document.getElementById('textInput');
        const sendBtn = document.getElementById('sendBtn');
        const imageFile = document.getElementById('imageFile');
        const fileInfo = document.getElementById('fileInfo');
        let selectedFile = null;

        // 初始化：添加欢迎消息
        window.onload = function() {
            addMessage('ai', '你好！我是YOLO11智能图片检测助手，支持上传图片并分析内容（如人数、物体类型、位置等），请上传图片并输入你的问题～');
        };

        // 文件选择事件（核心功能保留）
        imageFile.addEventListener('change', function(e) {
            console.log("=== 文件选择事件触发 ===");
            console.log("e.target.files:", e.target.files);
            selectedFile = null;
            fileInfo.textContent = '';
            
            if (e.target.files && e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                console.log("选中的文件：", selectedFile);
                
                if (selectedFile.type.startsWith('image/')) {
                    fileInfo.textContent = `已选择：${selectedFile.name} (${formatFileSize(selectedFile.size)})`;
                } else {
                    alert("请选择图片格式的文件（jpg/png/gif等）！");
                    e.target.value = '';
                    selectedFile = null;
                }
            } else {
                console.log("未选中任何文件或取消选择");
            }
            checkSendable();
        });

        // 发送消息逻辑（添加加载动画）
        sendBtn.addEventListener('click', sendMessage);
        textInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        function sendMessage() {
            const userText = textInput.value.trim();
            const hasText = userText.length > 0;
            const hasFile = selectedFile instanceof File;

            if (!hasText && !hasFile) {
                alert("请输入问题或选择有效的图片文件！");
                return;
            }

            // 添加用户消息
            let userMsg = userText || `上传了图片：${selectedFile.name}`;
            addMessage('user', userMsg);
            
            // 添加AI加载动画
            const loadingId = addLoadingMessage();

            // 构造FormData
            const formData = new FormData();
            if (hasText) formData.append('question', userText);
            if (hasFile) formData.append('image', selectedFile);

            // 发送请求
            fetch('/detect', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                // 移除加载动画
                removeLoadingMessage(loadingId);
                // 添加AI回复
                addMessage('ai', data['豆包AI分析'] || data.msg || '检测失败，请重试！');
                // 清空输入
                clearInput();
            })
            .catch(error => {
                removeLoadingMessage(loadingId);
                console.error("请求失败：", error);
                addMessage('ai', '请求出错，请检查网络或重试！');
            });
        }

        // 添加普通消息（主流大模型样式：头像+时间戳）
        function addMessage(type, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}-message`;
            
            // 头像
            const avatarDiv = document.createElement('div');
            avatarDiv.className = `message-avatar ${type}-avatar`;
            avatarDiv.innerHTML = type === 'user' ? '<i class="fas fa-user"></i>' : '<i class="fas fa-robot"></i>';
            
            // 内容区域
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            // 气泡
            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'message-bubble';
            bubbleDiv.textContent = content;
            
            // 时间戳
            const timeDiv = document.createElement('div');
            timeDiv.className = 'message-time';
            timeDiv.textContent = getCurrentTime();
            
            // 组装
            contentDiv.appendChild(bubbleDiv);
            contentDiv.appendChild(timeDiv);
            messageDiv.appendChild(avatarDiv);
            messageDiv.appendChild(contentDiv);
            
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // 添加加载动画消息
        function addLoadingMessage() {
            const loadingId = 'loading-' + Date.now();
            const loadingDiv = document.createElement('div');
            loadingDiv.id = loadingId;
            loadingDiv.className = 'message ai-message';
            
            const avatarDiv = document.createElement('div');
            avatarDiv.className = 'message-avatar ai-avatar';
            avatarDiv.innerHTML = '<i class="fas fa-robot"></i>';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            const loadingBubble = document.createElement('div');
            loadingBubble.className = 'message-bubble loading';
            loadingBubble.innerHTML = `
                <div class="loading-dot"></div>
                <div class="loading-dot"></div>
                <div class="loading-dot"></div>
            `;
            
            contentDiv.appendChild(loadingBubble);
            loadingDiv.appendChild(avatarDiv);
            loadingDiv.appendChild(contentDiv);
            
            chatBox.appendChild(loadingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            
            return loadingId;
        }

        // 移除加载动画
        function removeLoadingMessage(loadingId) {
            const loadingDiv = document.getElementById(loadingId);
            if (loadingDiv) loadingDiv.remove();
        }

        // 清空输入
        function clearInput() {
            textInput.value = '';
            imageFile.value = '';
            selectedFile = null;
            fileInfo.textContent = '';
            checkSendable();
        }

        // 检查发送按钮状态
        function checkSendable() {
            const canSend = textInput.value.trim() || (selectedFile instanceof File);
            sendBtn.disabled = !canSend;
        }

        // 格式化文件大小
        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1048576).toFixed(1) + ' MB';
        }

        // 获取当前时间（格式化）
        function getCurrentTime() {
            const now = new Date();
            return now.toLocaleTimeString('zh-CN', {
                hour: '2-digit',
                minute: '2-digit',
                hour12: false
            });
        }

        // 实时检查输入状态
        textInput.addEventListener('input', checkSendable);
        checkSendable();
    </script>
</body>
</html>
