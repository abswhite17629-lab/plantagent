# Deployment配置：部署python-web应用，包含镜像拉取密钥、资源限制、环境变量
apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-web
  namespace: python-web
  labels:
    app: python-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: python-web
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: python-web
    spec:
      imagePullSecrets:
        - name: jihulab-registry
      containers:
        - name: python-web
          image: registry.jihulab.com/abswhite-group/abswhite-project/python-app:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: MYSQL_HOST
              value: "mysql-service.mysql.svc.cluster.local"
            - name: MYSQL_PASSWORD
              value: "123456"
            - name: REDIS_HOST
              value: "redis-service.redis.svc.cluster.local"
            - name: REDIS_PASSWORD
              value: "123456"
          # ?? 关键修改：大幅提高内存限制（YOLO 应用至少需要 1Gi）
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m    # 1 核
              memory: 1Gi   # 1GB 内存（根据实际监控可调整）
          # ?? 建议暂时注释健康检查，避免因接口未实现导致 CrashLoopBackOff
          # livenessProbe:
          #   httpGet:
          #     path: /health
          #     port: 8000
          #   initialDelaySeconds: 30
          #   periodSeconds: 10
          # readinessProbe:
          #   httpGet:
          #     path: /ready
          #     port: 8000
          #   initialDelaySeconds: 5
          #   periodSeconds: 5
          imagePullPolicy: Always
---
# Service配置：暴露python-web应用，供集群内访问
apiVersion: v1
kind: Service
metadata:
  name: python-web-service
  namespace: python-web
  labels:
    app: python-web
spec:
  type: ClusterIP
  selector:
    app: python-web
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP