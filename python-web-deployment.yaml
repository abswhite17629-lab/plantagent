# Deployment配置：部署python-web应用，包含镜像拉取密钥、资源限制、环境变量
apiVersion: apps/v1
kind: Deployment
metadata:
  # Deployment名称（必须和CI命令中的一致）
  name: python-web
  # 命名空间（必须和CI命令中的一致）
  namespace: python-web
  labels:
    app: python-web
spec:
  # 副本数（按你的需求调整）
  replicas: 2
  selector:
    matchLabels:
      app: python-web
  # 部署策略：滚动更新（避免服务中断）
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: python-web
    spec:
      # 关键：引用极狐仓库的镜像拉取密钥（解决ImagePullBackOff）
      imagePullSecrets:
      - name: jihulab-registry
      containers:
      - name: python-web
        # 极狐仓库镜像地址（和CI构建的一致）
        image: registry.jihulab.com/abswhite-group/abswhite-project/python-app:latest
        # 容器端口（和应用监听的端口一致）
        ports:
        - containerPort: 8000
          protocol: TCP
        # 环境变量（保留你原有的配置）
        env:
        - name: MYSQL_HOST
          value: "mysql-service.mysql.svc.cluster.local"
        - name: MYSQL_PASSWORD
          value: "123456"
        - name: REDIS_HOST
          value: "redis-service.redis.svc.cluster.local"
        - name: REDIS_PASSWORD
          value: "123456"
        # 资源限制（避免节点资源不足导致Pod启动失败）
        resources:
          requests:
            cpu: 100m       # 最小CPU需求（100毫核）
            memory: 128Mi   # 最小内存需求
          limits:
            cpu: 500m       # 最大CPU限制
            memory: 256Mi   # 最大内存限制
        # 健康检查（可选，提升应用可用性）
        livenessProbe:
          httpGet:
            path: /health  # 需根据你的应用调整健康检查接口
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready   # 需根据你的应用调整就绪检查接口
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
        # 镜像拉取策略：每次重启都拉取最新镜像
        imagePullPolicy: Always
---
# Service配置：暴露python-web应用，供集群内访问
apiVersion: v1
kind: Service
metadata:
  name: python-web-service
  namespace: python-web
  labels:
    app: python-web
spec:
  # Service类型：ClusterIP（仅集群内访问），如需外部访问可改为NodePort/LoadBalancer
  type: ClusterIP
  selector:
    app: python-web
  ports:
  - name: http
    port: 8000          # Service端口
    targetPort: 8000    # 容器端口
    protocol: TCP