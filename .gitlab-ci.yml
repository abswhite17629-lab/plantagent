stages:
  - build
  - deploy

build:
  stage: build
  tags:
    - python,k8s,centos7
  script:
    - docker build -t https://abswhite@jihulab.com/abswhite-group/abswhite-project.git/python-app:latest .
    - docker push https://abswhite@jihulab.com/abswhite-group/abswhite-project.git/python-app:latest

deploy:
  stage: deploy
  tags:
    - python,k8s,centos7
  script:
    - kubectl set image deployment/python-app python-app=https://abswhite@jihulab.com/abswhite-group/abswhite-project.git/python-app:latest -n python-app
    - kubectl rollout restart deployment/python-app -n python-app
