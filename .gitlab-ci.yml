stages:
  - build
  - deploy

# 构建阶段：保留你所有原有配置（仅添加安全提醒注释）
build:
  stage: build
  tags:
    - python-web
  image: docker:latest  # 明确指定latest，适配14.6.0 Runner
  variables:
    # 指向宿主机Docker的unix套接字（保持不变）
    DOCKER_HOST: "unix:///var/run/docker.sock"
    # 核心修改1：极狐GitLab容器仓库正确域名
    CI_REGISTRY: "registry.jihulab.com"
    CI_REGISTRY_USER: "abswhite"
    # 安全提醒：密码建议移到GitLab项目的CI/CD变量中（Settings -> CI/CD -> Variables）
    CI_REGISTRY_PASSWORD: "SBPah9dv49JsSGh9xvWPb286MQp1OjRwN2sK.01.1013amva0"
    # 核心修改2：镜像仓库地址同步改为正确域名
    CI_REGISTRY_IMAGE: "registry.jihulab.com/abswhite-group/abswhite-project/python-app"
  script:
    # 验证Docker连接（保持不变）
    - docker version
    # 登录镜像仓库（保持不变，域名已修正）
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
    # 构建镜像（保持不变）
    - docker build -t $CI_REGISTRY_IMAGE:latest .
    # 核心修改3：添加推送重试逻辑，失败自动重试2次
    - docker push $CI_REGISTRY_IMAGE:latest || 
      docker push $CI_REGISTRY_IMAGE:latest || 
      docker push $CI_REGISTRY_IMAGE:latest
  # 新增：流水线重试策略，适配14.6.0 Runner
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  # 统一触发规则：仅main分支
  only:
    - main

# 部署阶段：新增kubeconfig配置逻辑，保留原有部署命令
deploy:
  stage: deploy
  tags:
    - python-web
  image:
    name: bitnami/kubectl:1.22.4
    entrypoint: [""]  # 保持原有entrypoint配置，避免kubectl镜像默认入口干扰
  script:
    # ========== 新增核心步骤：配置K8s连接 ==========
    # 1. 将GitLab的KUBECONFIG_CONTENT变量写入临时配置文件
    - echo "$KUBECONFIG_CONTENT" > /tmp/kubeconfig
    # 2. 告诉kubectl使用这个配置文件
    - export KUBECONFIG=/tmp/kubeconfig
    # 3. 可选：验证K8s集群连接（方便排查问题）
    - kubectl get nodes
    # ========== 保留你原有部署逻辑 ==========
    # 使用 kubectl 命令设置镜像并重启部署
    - kubectl set image deployment/python-app python-app=$CI_REGISTRY_IMAGE:latest -n python-app
    - kubectl rollout restart deployment/python-app -n python-app
  needs:
    - build
  only:
    - main
  # 可选：添加部署重试策略（和build阶段保持一致）
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure