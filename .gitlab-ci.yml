stages:
  - build
  - deploy

build:
  stage: build
  tags:
    - python-web
  image: docker:latest
  services:
    # 移除privileged参数（旧Runner不支持），仅保留dind服务
    - docker:latest-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: "tcp://localhost:2375"  # 核心：绕过docker主机名解析
    DOCKER_DRIVER: "overlay2"
    CI_REGISTRY: "jihulab.com"
    CI_REGISTRY_USER: "abswhite"
    CI_REGISTRY_PASSWORD: "SBPah9dv49JsSGh9xvWPb286MQp1OjRwN2sK.01.1013amva0"  # 替换为实际PAT
    CI_REGISTRY_IMAGE: "jihulab.com/abswhite-group/abswhite-project/python-app"
  before_script:
    # 等待docker daemon启动（关键：避免连接过早失败）
    - until docker info; do sleep 1; done
    # 安全登录镜像仓库
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
  script:
    - docker build -t $CI_REGISTRY_IMAGE:latest .
    - docker push $CI_REGISTRY_IMAGE:latest

deploy:
  stage: deploy
  tags:
    - python-web
  image: kubectl:1.22.4
  script:
    - kubectl set image deployment/python-app python-app=$CI_REGISTRY_IMAGE:latest -n python-app
    - kubectl rollout restart deployment/python-app -n python-app
  only:
    - main